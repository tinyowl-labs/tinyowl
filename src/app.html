<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="text-scale" content="scale" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..700&display=swap"
            rel="stylesheet"
        />
        <script>
            (function () {
                try {
                    var bg = localStorage.getItem("redthread:theme:bgBase") || "dark";
                    var hue = Number(localStorage.getItem("redthread:theme:accentHue") || "220");
                    if (!isFinite(hue)) hue = 220;
                    var bgL = { pitch: 0.07, dark: 0.12, dim: 0.2, stone: 0.9, paper: 0.97 }[bg];
                    if (bgL == null) bgL = 0.12;
                    var dark = bgL < 0.5;
                    var root = document.documentElement;
                    if (dark) root.classList.add("dark");
                    else root.classList.remove("dark");
                    root.style.setProperty("--accent-hue", String(hue));
                    root.style.setProperty("--bg-l", String(bgL));
                } catch (e) {}
            })();
        </script>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
